<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F Expert - Submit Payment Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f9fafb;
            --bg-container: #ffffff;
            --bg-active: #efefef;
            --bg-hover: #efefef;
            --bg-hover2: #dbdbdb;
            --bg-disabled: #dbdbdb;
            --text-default: #131825;
            --text-secondary: #73726e;
            --text-disabled: #ababa9;
            --border-divider: #e5e7eb;
            --border-default: #d9d9d9;
            --button-default: #131825;
            --white: #ffffff;
            --error-base: #f5222d;
            --primary: #1C64F2;
            --green-base: #10b981;
            --green-light: #d1fae5;
            --green-border: #6ee7b7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-default);
            height: 100vh;
            overflow: hidden;
        }

        .app { display: flex; width: 100%; height: 100vh; }

        /* Icon Rail */
        .icon-rail {
            width: 48px;
            height: 100vh;
            background: var(--bg-container);
            border-right: 1px solid var(--border-divider);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            flex-shrink: 0;
        }
        .icon-rail-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .icon-rail-btn:hover { background: var(--bg-hover); }
        .icon-rail-btn.active { color: var(--primary); }
        .icon-rail-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .icon-rail-avatar {
            width: 28px; height: 28px;
            border-radius: 14px;
            background: linear-gradient(135deg, #34d399, #059669);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: #fff;
            cursor: pointer;
        }

        /* Sidebar List Panel */
        .sidebar-panel {
            width: 300px;
            height: 100vh;
            background: var(--bg-container);
            border-right: 1px solid var(--border-divider);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-divider);
        }
        .sidebar-header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .expert-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #34d399, #059669);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .expert-icon svg { width: 22px; height: 22px; }
        .expert-title {
            font-size: 18px; font-weight: 700; line-height: 26px;
        }
        .header-icons {
            display: flex; align-items: center; gap: 4px; margin-left: auto;
        }
        .header-icon-btn {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; cursor: pointer;
            transition: background 0.15s;
            color: var(--text-secondary);
        }
        .header-icon-btn:hover { background: var(--bg-hover); }
        .avatar-stack {
            display: flex; align-items: center; margin-bottom: 12px;
        }
        .avatar-circle {
            width: 24px; height: 24px;
            border-radius: 12px;
            border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; color: #fff;
            margin-left: -6px;
        }
        .avatar-circle:first-child { margin-left: 0; }
        .avatar-more {
            width: 24px; height: 24px;
            border-radius: 12px;
            background: var(--bg-active);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 500; color: var(--text-secondary);
            margin-left: -6px;
        }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border-divider);
            border-radius: 8px;
            background: var(--bg-container);
            margin-bottom: 8px;
        }
        .search-box input {
            border: none; outline: none; flex: 1;
            font-size: 13px; font-family: inherit;
            color: var(--text-default);
            background: transparent;
        }
        .search-box input::placeholder { color: var(--text-disabled); }
        .filter-tag {
            display: inline-flex; align-items: center;
            padding: 4px 12px;
            border: 1px solid var(--border-default);
            border-radius: 6px;
            font-size: 13px; font-weight: 500;
            color: var(--text-default);
            cursor: pointer;
            background: var(--bg-container);
        }

        .sidebar-list {
            flex: 1; overflow-y: auto;
        }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .list-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-divider);
            display: flex;
            gap: 8px;
            transition: background 0.15s;
            position: relative;
        }
        .list-item:hover { background: var(--bg-hover); }
        .list-item.active { background: #f0fdf4; }
        .list-item-content { flex: 1; min-width: 0; }
        .list-item-title {
            font-size: 13px; font-weight: 500; line-height: 20px;
            color: var(--text-default);
            margin-bottom: 2px;
        }
        .list-item-desc {
            font-size: 12px; line-height: 18px;
            color: var(--text-secondary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            margin-bottom: 4px;
        }
        .list-item-tag {
            display: inline-block;
            padding: 1px 8px;
            background: var(--bg-active);
            border-radius: 4px;
            font-size: 11px; color: var(--text-secondary);
        }
        .list-item-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-container);
            position: relative;
        }
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-divider);
        }
        .main-title {
            font-size: 20px; font-weight: 600; line-height: 28px;
        }
        .ddl-badge {
            font-size: 13px; font-weight: 500;
            color: var(--error-base);
        }

        .month-tabs {
            display: flex; align-items: center; gap: 0;
            padding: 0 32px;
            border-bottom: 1px solid var(--border-divider);
        }
        .month-tab {
            padding: 10px 16px;
            font-size: 13px; font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: color 0.15s;
        }
        .month-tab:hover { color: var(--text-default); }
        .month-tab.active {
            color: var(--primary);
        }
        .month-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 12px; right: 12px;
            height: 2px;
            background: var(--primary);
            border-radius: 1px;
        }
        .month-tab .count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 18px; height: 18px;
            background: var(--primary);
            color: #fff;
            border-radius: 9px;
            font-size: 11px; font-weight: 600;
            margin-left: 4px;
            padding: 0 5px;
        }

        .main-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .upload-panel {
            width: 520px;
            border-right: 1px solid var(--border-divider);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .upload-panel::-webkit-scrollbar { width: 4px; }
        .upload-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .upload-zone {
            border: 2px dashed var(--green-border);
            border-radius: 12px;
            background: #f0fdf4;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.15s;
        }
        .upload-zone:hover { background: #dcfce7; }
        .upload-zone-text {
            font-size: 14px; font-weight: 600;
            color: var(--green-base);
        }
        .upload-zone-hint {
            font-size: 12px;
            color: var(--text-disabled);
            margin-top: 4px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-divider);
        }
        .file-icon {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .file-info { flex: 1; min-width: 0; }
        .file-name {
            font-size: 13px; font-weight: 400;
            color: var(--text-default);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .file-status {
            font-size: 11px; font-weight: 500;
            text-transform: uppercase;
        }
        .file-status.denied { color: var(--error-base); }
        .file-status.checked { color: var(--green-base); }
        .file-status.pending { color: var(--text-disabled); }
        .file-remove {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-disabled);
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .file-remove:hover { color: var(--error-base); background: #fff1f0; }

        .file-list-footer {
            padding: 12px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-disabled);
        }

        .preview-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-disabled);
            font-size: 14px;
        }
    </style>
</head>

<div class="app">
    <!-- Icon Rail -->
    <nav class="icon-rail">

    <!-- Sidebar List Panel -->
    <aside class="sidebar-panel">
        <div class="sidebar-header">
            <div class="sidebar-header-top">
                <div class="expert-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                </div>
                <span class="expert-title">F Expert</span>
                <div class="header-icons">
                    <div class="header-icon-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </div>
                    <div class="header-icon-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>

<script>
    const sidebarItems = [
        { title: 'March Invoice Collection', desc: '', sub: 'Submitted 26', tag: '', dot: true, href: 'F-PAP-PAYMENT-REQUEST.html' },
        { title: 'March Invoice Review', desc: '', sub: 'Pending 18', tag: '', dot: true, href: 'F-PAP-PAYMENT-REVIEW.html' },
    ];

    const files = [
        { name: 'zthd_zhidingshengxing_ban...', status: 'denied' },
        { name: '查找阿里千问模型API Key.png', status: 'denied' },
        { name: '1775115442227-jmdcof.pdf', status: 'denied' },
        { name: '1775115442310-6mu8lj.pdf', status: 'checked' },
        { name: '1775115442312-mskzoa.pdf', status: 'checked' },
        { name: '1775115442351-blfsr8.pdf', status: 'denied' },
        { name: '1775115442174-r64zpb.pdf', status: 'pending' },
        { name: '20260228_株式会社くるめし...', status: 'pending' },
        { name: '20260228_医療法人社団　東...', status: 'pending' },
        { name: '20260228_StepOut合同会社...', status: 'pending' },
    ];

    const PDF_ICON = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><polyline points="14 2 14 8 20 8" fill="none" stroke="#d1d5db" stroke-width="1.5"/><text x="12" y="17" text-anchor="middle" font-size="6" font-weight="600" fill="#6b7280" font-family="Inter, sans-serif">PDF</text></svg>`;
    const IMG_ICON = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="#9ca3af"/><path d="M21 15l-5-5L5 21" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>`;

    function getFileIcon(name) {
        if (name.endsWith('.pdf')) return PDF_ICON;
        if (name.endsWith('.png') || name.endsWith('.jpg')) return IMG_ICON;
        return PDF_ICON;
    }

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = sidebarItems.map((item, i) => `
            <div class="list-item${i === 0 ? ' active' : ''}" onclick="if('${item.href}'){window.location.href='${item.href}'}else{selectSidebarItem(this)}">
                <div class="list-item-content">
                    <div class="list-item-title">${item.title}</div>
                    ${item.sub ? `<div class="list-item-desc" style="font-weight:500;color:var(--text-secondary);">${item.sub}</div>` : ''}
                    ${item.desc ? `<div class="list-item-desc">${item.desc}</div>` : ''}
                    ${item.tag ? `<span class="list-item-tag">${item.tag}</span>` : ''}
                </div>
                ${item.dot ? '<div class="list-item-dot"></div>' : ''}
            </div>
        `).join('');
    }

    function renderFiles() {
        const list = document.getElementById('fileList');
        list.innerHTML = files.map((f, i) => `
            <div class="file-item" data-idx="${i}" onclick="selectFile(${i})">
                <div class="file-icon">${getFileIcon(f.name)}</div>
                <div class="file-info">
                    <div class="file-name">${f.name}</div>
                    <div class="file-status ${f.status}">STATUS ${f.status}</div>
                </div>
                <div class="file-remove" onclick="event.stopPropagation(); removeFile(${i})">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </div>
            </div>
        `).join('');
    }

    function selectSidebarItem(el) {
        document.querySelectorAll('.list-item').forEach(li => li.classList.remove('active'));
        el.classList.add('active');
    }

    function selectFile(idx) {
        const file = files[idx];
        const panel = document.getElementById('previewPanel');
        panel.innerHTML = `
            <div style="text-align:center;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="margin-bottom:16px;">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
                    <polyline points="14 2 14 8 20 8" fill="none" stroke="#d1d5db" stroke-width="1"/>
                </svg>
                <div style="font-size:14px;color:var(--text-default);font-weight:500;margin-bottom:4px;">${file.name}</div>
                <div style="font-size:12px;" class="file-status ${file.status}">STATUS: ${file.status.toUpperCase()}</div>
            </div>
        `;
    }

    function removeFile(idx) {
        files.splice(idx, 1);
        renderFiles();
        document.getElementById('submitCount').textContent = `${files.length} submitted`;
    }

    document.getElementById('uploadZone').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.accept = '.jpg,.png,.pdf';
        input.onchange = (e) => {
            for (const f of e.target.files) {
                files.push({ name: f.name, status: 'pending' });
            }
            renderFiles();
            document.getElementById('submitCount').textContent = `${files.length} submitted`;
        };
        input.click();
    });

    renderSidebar();
    renderFiles();
</script>
</body>
</html>

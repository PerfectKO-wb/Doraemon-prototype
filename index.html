<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon — Project Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0e16;
            --surface: #151821;
            --surface-hover: #1c2030;
            --border: rgba(255,255,255,0.06);
            --text: #e8e4dd;
            --text-dim: #6b6d7b;
            --accent-amber: #f0b429;
            --accent-amber-glow: rgba(240,180,41,0.15);
            --accent-teal: #36d6b5;
            --accent-teal-glow: rgba(54,214,181,0.15);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Noto Sans SC', 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb.amber {
            width: 500px; height: 500px;
            background: var(--accent-amber);
            opacity: 0.04;
            top: -10%; left: 20%;
        }
        .glow-orb.teal {
            width: 400px; height: 400px;
            background: var(--accent-teal);
            opacity: 0.035;
            bottom: -5%; right: 15%;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        .header {
            margin-bottom: 64px;
            animation: fadeUp 0.8s ease both;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .brand-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #4a90d9, #6ba3e8);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(74,144,217,0.25);
        }

        .brand-icon svg {
            width: 32px; height: 32px;
        }

        .brand-text {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a0a4b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Cards grid */
        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.22,1,0.36,1),
                        box-shadow 0.35s cubic-bezier(0.22,1,0.36,1),
                        border-color 0.3s ease;
            animation: fadeUp 0.8s ease both;
        }

        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.3s; }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .card.amber::before {
            background: radial-gradient(ellipse at 30% 20%, var(--accent-amber-glow) 0%, transparent 70%);
        }

        .card.teal::before {
            background: radial-gradient(ellipse at 30% 20%, var(--accent-teal-glow) 0%, transparent 70%);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.1);
        }

        .card:hover::before { opacity: 1; }

        .card.amber:hover {
            box-shadow: 0 20px 60px rgba(240,180,41,0.08), 0 2px 8px rgba(0,0,0,0.3);
        }

        .card.teal:hover {
            box-shadow: 0 20px 60px rgba(54,214,181,0.08), 0 2px 8px rgba(0,0,0,0.3);
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 8px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 22px;
            position: relative;
        }

        .card.amber .card-badge {
            background: rgba(240,180,41,0.12);
            color: var(--accent-amber);
        }

        .card.teal .card-badge {
            background: rgba(54,214,181,0.12);
            color: var(--accent-teal);
        }

        .card-badge-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
        }

        .card.amber .card-badge-dot { background: var(--accent-amber); }
        .card.teal .card-badge-dot { background: var(--accent-teal); }

        .card-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 10px;
            position: relative;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 28px;
            position: relative;
        }

        .card-arrow {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 500;
            position: relative;
            transition: gap 0.3s ease;
        }

        .card.amber .card-arrow { color: var(--accent-amber); }
        .card.teal .card-arrow { color: var(--accent-teal); }

        .card:hover .card-arrow { gap: 14px; }

        .card-arrow svg {
            width: 18px; height: 18px;
            transition: transform 0.3s ease;
        }

        .card:hover .card-arrow svg {
            transform: translateX(4px);
        }

        /* Corner decoration */
        .card-corner {
            position: absolute;
            top: 0; right: 0;
            width: 120px; height: 120px;
            opacity: 0.04;
            pointer-events: none;
        }

        .card.amber .card-corner { color: var(--accent-amber); }
        .card.teal .card-corner { color: var(--accent-teal); }

        /* Footer */
        .footer {
            margin-top: 80px;
            padding-bottom: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeUp 0.8s ease 0.45s both;
        }

        .footer-left {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 300;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            font-size: 12px;
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--text); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .page { padding: 0 20px; }
            .cards { grid-template-columns: 1fr; }
            .brand-text { font-size: 26px; }
            .card-title { font-size: 20px; }
            .header { margin-bottom: 48px; }
        }
    </style>
</head>
<body>
    <div class="glow-orb amber"></div>
    <div class="glow-orb teal"></div>

        <div class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="18" fill="#fff" opacity="0.9"/>
                        <circle cx="18" cy="21" r="2.8" fill="#2a2a3e"/>
                        <circle cx="30" cy="21" r="2.8" fill="#2a2a3e"/>
                        <path d="M18 30c0 0 3 4 6 4s6-4 6-4" stroke="#2a2a3e" stroke-width="2.2" stroke-linecap="round" fill="none"/>

            <!-- Card 3: BD Developer原型 -->
            <a class="card amber" href="BD-developer-v2.html">
                <svg class="card-corner" viewBox="0 0 120 120" fill="none">

        </div>

        <div class="footer">
            <div class="footer-left">© 2026 Doraemon Team — Internal Use</div>
            <div class="footer-links">
                <a href="i18n-table.html">i18n Table</a>
                <a href="workspace.html">Workspace</a>
                <a href="cs-demo.html">CS Demo</a>
            </div>
        </div>
    </div>
</body>
</html>

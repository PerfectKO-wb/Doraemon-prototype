<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F Expert - JE Details Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f9fafb;
            --bg-container: #ffffff;
            --bg-active: #efefef;
            --bg-hover: #efefef;
            --bg-hover2: #dbdbdb;
            --bg-disabled: #dbdbdb;
            --text-default: #131825;
            --text-secondary: #73726e;
            --text-disabled: #ababa9;
            --border-divider: #e5e7eb;
            --border-default: #d9d9d9;
            --button-default: #131825;
            --white: #ffffff;
            --error-base: #f5222d;
            --primary: #1C64F2;
            --green-base: #10b981;
            --green-light: #d1fae5;
            --green-border: #6ee7b7;
            --orange-base: #fa8c16;
            --orange-bg: #fff7e6;
            --orange-border: #ffd591;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-default);
            height: 100vh;
            overflow: hidden;
        }

        .app { display: flex; width: 100%; height: 100vh; }

        /* Icon Rail */
        .icon-rail {
            width: 48px; height: 100vh;
            background: var(--bg-container);
            border-right: 1px solid var(--border-divider);
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 0; flex-shrink: 0;
        }
        .icon-rail-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer;
            transition: background 0.15s; margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .icon-rail-btn:hover { background: var(--bg-hover); }
        .icon-rail-btn.active { color: var(--primary); }
        .icon-rail-bottom {
            margin-top: auto;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .icon-rail-avatar {
            width: 28px; height: 28px; border-radius: 14px;
            background: linear-gradient(135deg, #34d399, #059669);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: #fff; cursor: pointer;
        }

        /* Sidebar */
        .sidebar-panel {
            width: 300px; height: 100vh;
            background: var(--bg-container);
            border-right: 1px solid var(--border-divider);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-divider); }
        .sidebar-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .expert-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, #34d399, #059669);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .expert-title { font-size: 18px; font-weight: 700; line-height: 26px; }
        .header-icons { display: flex; align-items: center; gap: 4px; margin-left: auto; }
        .header-icon-btn {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; cursor: pointer; transition: background 0.15s;
            color: var(--text-secondary);
        }
        .header-icon-btn:hover { background: var(--bg-hover); }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; border: 1px solid var(--border-divider);
            border-radius: 8px; background: var(--bg-container); margin-bottom: 8px;
        }
        .search-box input {
            border: none; outline: none; flex: 1; font-size: 13px; font-family: inherit;
            color: var(--text-default); background: transparent;
        }
        .search-box input::placeholder { color: var(--text-disabled); }

        .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-tag {
            display: inline-flex; align-items: center;
            padding: 4px 12px; border: 1px solid var(--border-default);
            border-radius: 6px; font-size: 13px; font-weight: 500;
            color: var(--text-secondary); cursor: pointer; background: var(--bg-container);
            transition: all 0.15s;
        }
        .filter-tag.active {
            background: var(--orange-bg); color: #d97706; border-color: var(--orange-border);
        }
        .filter-tag:hover { background: var(--bg-hover); }

        .sidebar-list { flex: 1; overflow-y: auto; }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .list-item {
            padding: 12px 16px; cursor: pointer;
            border-bottom: 1px solid var(--border-divider);
            display: flex; gap: 10px; transition: background 0.15s;
        }
        .list-item:hover { background: var(--bg-hover); }
        .list-item.active { background: #f0fdf4; }
        .list-item-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 16px;
        }
        .list-item-icon.je { background: #fef3c7; }
        .list-item-content { flex: 1; min-width: 0; }
        .list-item-title {
            font-size: 13px; font-weight: 500; line-height: 20px;
            color: var(--text-default); margin-bottom: 2px;
        }
        .list-item-desc {
            font-size: 12px; line-height: 18px; color: var(--text-secondary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .list-item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .list-item-tag {
            display: inline-block; padding: 1px 8px;
            border-radius: 4px; font-size: 11px; font-weight: 500;
        }
        .tag-pending { background: #fef3c7; color: #d97706; }
        .tag-confirmed { background: #d1fae5; color: #059669; }
        .tag-je { background: #fef3c7; color: #92400e; }
        .list-item-dot {
            width: 8px; height: 8px; background: var(--orange-base);
            border-radius: 50%; flex-shrink: 0; margin-top: 6px;
        }

        /* Main Chat Area */
        .main {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-base); position: relative;
        }
        .chat-header {
            display: flex; align-items: center; padding: 12px 24px;
            background: var(--bg-container); border-bottom: 1px solid var(--border-divider);
            gap: 12px;
        }
        .chat-header-title { font-size: 14px; font-weight: 600; flex: 1; }

        .chat-body {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .msg-row { display: flex; gap: 12px; max-width: 780px; }
        .msg-row.ai { align-items: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 14px;
        }
        .msg-avatar.ai-avatar {
            background: linear-gradient(135deg, #34d399, #059669);
            color: #fff; font-size: 11px; font-weight: 600;
        }
        .msg-avatar.user-avatar {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            color: #fff; font-size: 11px; font-weight: 600;
        }

        .msg-bubble { max-width: 680px; }
        .msg-row.user .msg-bubble {
            background: var(--bg-hover); padding: 10px 16px; border-radius: 12px;
        }
        .msg-name {
            font-size: 12px; font-weight: 600; color: var(--text-default); margin-bottom: 4px;
        }
        .msg-text {
            font-size: 14px; line-height: 22px; color: var(--text-default);
            white-space: pre-line;
        }
        .msg-time {
            font-size: 11px; color: var(--text-disabled); margin-top: 4px;
        }

        /* Confirm Button */
        .msg-actions { display: flex; gap: 8px; margin-top: 12px; }
        .msg-action-btn {
            padding: 6px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            border: 1px solid var(--border-default); background: var(--bg-container);
            color: var(--text-default); transition: all 0.15s;
        }
        .msg-action-btn:hover { background: var(--bg-hover); }
        .msg-action-btn.primary {
            background: var(--green-base); color: #fff; border-color: var(--green-base);
        }
        .msg-action-btn.primary:hover { background: #059669; }

        /* Chat Input */
        .chat-input-area {
            padding: 16px 24px; background: var(--bg-container);
            border-top: 1px solid var(--border-divider);
        }
        .chat-input-box {
            display: flex; align-items: flex-end; gap: 12px;
            background: var(--bg-base); border: 1px solid var(--border-divider);
            border-radius: 12px; padding: 12px 16px;
        }
        .chat-input-box textarea {
            flex: 1; border: none; outline: none; resize: none;
            font-size: 14px; font-family: inherit; color: var(--text-default);
            background: transparent; height: 22px; max-height: 120px;
        }
        .chat-input-box textarea::placeholder { color: var(--text-disabled); }
        .send-btn {
            width: 36px; height: 36px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: all 0.15s;
            background: var(--button-default); color: #fff; flex-shrink: 0;
        }
        .send-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="app">
    <!-- Icon Rail -->
    <nav class="icon-rail">
        <div class="icon-rail-btn" title="Home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <div class="icon-rail-btn" title="Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="icon-rail-btn" title="People">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div style="height:16px;"></div>
        <div class="icon-rail-btn" style="font-size:10px;font-weight:600;color:var(--text-disabled);" title="CS">CS</div>
        <div class="icon-rail-btn" style="font-size:10px;font-weight:600;color:var(--text-disabled);" title="i18n">i18n</div>
        <div class="icon-rail-btn" style="font-size:10px;font-weight:600;color:var(--text-disabled);" title="CP">CP</div>
        <div class="icon-rail-btn active" style="font-size:10px;font-weight:600;" title="F">F</div>
        <div class="icon-rail-btn" style="font-size:10px;font-weight:600;color:var(--text-disabled);" title="Tech">Tech</div>
        <div class="icon-rail-btn" style="font-size:10px;font-weight:600;color:var(--text-disabled);" title="BD">BD</div>
        <div class="icon-rail-bottom">
            <div class="icon-rail-btn" title="Download">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <div class="icon-rail-btn" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <div class="icon-rail-avatar">ZM</div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar-panel">
        <div class="sidebar-header">
            <div class="sidebar-header-top">
                <div class="expert-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                </div>
                <span class="expert-title">F Expert</span>
                <div class="header-icons">
                    <div class="header-icon-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </div>
                    <div class="header-icon-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </div>
                </div>
            </div>
            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ababa9" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search conversations...">
            </div>
            <div class="filter-tabs">
                <div class="filter-tag active">All</div>
            </div>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main">
        <div class="chat-header">
            <span class="chat-header-title">JE Details Review</span>
        </div>

        <div class="chat-body" id="chatBody"></div>

        <div class="chat-input-area">
            <div class="chat-input-box">
                <textarea rows="1" placeholder="Type a message to confirm or request changes..." id="chatInput" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    const sidebarItems = [
        { title: 'Invoice Collection', sub: 'Submitted 26', dot: true, href: 'F-PAP-PAYMENT-REQUEST.html' },
        { title: 'Invoice Review', sub: 'Pending 18', dot: true, href: 'F-PAP-PAYMENT-REVIEW.html' },
        { title: 'JE Details Review', sub: 'Pending 2', dot: true, href: 'F-JE-REVIEW-CHAT.html' },
    ];
    const currentPage = 'F-JE-REVIEW-CHAT.html';

    function renderSidebar() {
        const list = document.getElementById('sidebarList');
        list.innerHTML = sidebarItems.map(item => `
            <div class="list-item${item.href === currentPage ? ' active' : ''}" onclick="window.location.href='${item.href}'">
                <div class="list-item-content">
                    <div class="list-item-title">${item.title}</div>
                    ${item.sub ? `<div class="list-item-desc" style="font-weight:500;">${item.sub}</div>` : ''}
                </div>
                ${item.dot ? '<div class="list-item-dot"></div>' : ''}
            </div>
        `).join('');
    }

    const chatMessages = [
        {
            role: 'ai', time: '10:32 AM',
            html: `<div class="msg-text">I've detected a bank transaction that needs your review before I can generate the JE. Here are the details:\n\nTransaction ID: TXN-2026-04-0312\nBank Name: Sumitomo Mitsui (SMBC)\nAmount: ¥33,000\nCounterparty: エムスリーキャリア株式会社\nDescription: 産業医委託費 2026年1月分\nTransaction Date: 2026-04-05\nCounterparty Bank: 三菱UFJ銀行 本店\nCounterparty Account: 2285736\n\nPlease review and let me know if any fields need to be corrected.</div>`
        },
        {
            role: 'user', time: '10:35 AM',
            html: `<div class="msg-text">Bank Name needs to be changed to United Overseas Bank Limited.</div>`
        },
        {
            role: 'ai', time: '10:35 AM',
            html: `<div class="msg-text">Got it. Here is the updated summary:\n\nBank Name: Sumitomo Mitsui (SMBC) → United Overseas Bank Limited\n\nAll other fields remain unchanged. Please confirm to proceed with JE generation.</div>
                <div class="msg-actions">
                    <button class="msg-action-btn primary" onclick="handleConfirm()">✓ Confirm</button>
                </div>`
        },
    ];

    function renderChat() {
        const body = document.getElementById('chatBody');
        body.innerHTML = chatMessages.map(m => `
            <div class="msg-row ${m.role}">
                <div class="msg-avatar ${m.role === 'ai' ? 'ai-avatar' : 'user-avatar'}">${m.role === 'ai' ? 'F' : 'ZM'}</div>
                <div class="msg-bubble">
                    <div class="msg-name">${m.role === 'ai' ? 'F Expert AI' : 'Zhang Ming'}</div>
                    ${m.html}
                    <div class="msg-time">${m.time}</div>
                </div>
            </div>
        `).join('');
        body.scrollTop = body.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        chatMessages.push({
            role: 'user', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
            html: `<div class="msg-text">${text}</div>`
        });
        input.value = '';
        renderChat();

        setTimeout(() => {
            chatMessages.push({
                role: 'ai', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
                html: `<div class="msg-text">Thank you for the update. I've noted the change. Please confirm to proceed.</div>
                    <div class="msg-actions">
                        <button class="msg-action-btn primary" onclick="handleConfirm()">✓ Confirm</button>
                    </div>`
            });
            renderChat();
        }, 1200);
    }

    function handleConfirm() {
        chatMessages.push({
            role: 'ai', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
            html: `<div class="msg-text">JE has been generated successfully. JE ID: JE-2026-04-0089.</div>`
        });
        renderChat();
    }

    renderSidebar();
    renderChat();
</script>
</body>
</html>

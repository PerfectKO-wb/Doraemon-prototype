<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAP — Finance Task Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            background: #f5f5f7;
            -webkit-font-smoothing: antialiased;
        }

        .ds3-ui-layer {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background:
                radial-gradient(ellipse 80% 50% at 20% 80%, rgba(120,119,198,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(59,130,246,0.05) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 70%),
                linear-gradient(180deg, #f8f9fa 0%, #f0f1f3 100%);
        }

        /* ── User Badge (top-left) ── */
        .user-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 100;
        }
        .user-badge button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px 6px 6px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: 0 4px 16px rgba(31,38,135,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
            color: rgba(0,0,0,0.8);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s;
        }
        .user-badge button:hover {
            background: rgba(255,255,255,0.5);
            box-shadow: 0 4px 20px rgba(31,38,135,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
        }
        .user-badge .avatar {
            width: 28px; height: 28px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(16,185,129,0.12);
            color: #059669;
            font-size: 10px;
            font-weight: 700;
        }
        .user-badge .user-info {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
            text-align: left;
        }
        .user-badge .user-name { font-weight: 500; }
        .user-badge .user-role {
            font-size: 10px;
            opacity: 0.45;
            font-weight: 400;
        }
        .user-badge .dropdown-arrow {
            font-size: 10px;
            opacity: 0.4;
        }

        /* ── Scrollable Content ── */
        .scroll-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .scroll-inner {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 50px 40px 40px;
            min-height: 100vh;
        }
        .scroll-inner::-webkit-scrollbar { width: 6px; }
        .scroll-inner::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }

        .content {
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── Date ── */
        .date-block {
            margin-bottom: 24px;
        }
        .date-main {
            font-size: 32px;
            font-weight: 800;
            color: rgba(0,0,0,0.85);
            line-height: 1.2;
        }
        .date-sub {
            font-size: 14px;
            font-weight: 500;
            color: rgba(0,0,0,0.35);
            margin-top: 4px;
        }

        /* ── Greeting ── */
        .greeting-line {
            font-size: 16px;
            color: rgba(0,0,0,0.35);
            line-height: 1.9;
            white-space: pre-wrap;
            transition: color 0.6s ease;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px; height: 16px;
            background: rgba(0,0,0,0.3);
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .reminder-icon {
            flex-shrink: 0;
            font-size: 18px;
            margin-top: 1px;
        }
        .reminder-content { flex: 1; }
        .reminder-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 3px;
        }
        .reminder-desc {
            font-size: 12px;
            line-height: 1.6;
        }

        /* ── Section Label ── */
        .section-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(0,0,0,0.4);
            margin: 24px 0 12px;
        }
        .section-label:first-child { margin-top: 16px; }

        /* ── Task Cards Container ── */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 0 0 8px;
        }

        /* ── Task Card ── */
        .task-card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(31,38,135,0.08), inset 0 1px 0 rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            cursor: pointer;
            color: inherit;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            transform: translateY(12px);
        }
        .task-card:hover {
            background: rgba(255,255,255,0.65);
            transform: translateY(-1px);
            box-shadow: 0 12px 40px rgba(31,38,135,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
        }
        .task-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Compact Card ── */
        .task-card.compact {
            padding: 12px 16px;
            gap: 12px;
            border-radius: 16px;
        }
        .task-card.compact .card-icon {
            width: 36px; height: 36px;
            font-size: 18px;
            border-radius: 10px;
        }
        .task-card.compact .card-title {
            font-size: 14px;
            margin-bottom: 2px;
        }
        .task-card.compact .card-desc {
            font-size: 11px;
        }

        /* ── View More Button ── */
        .view-more-btn {
            display: block;
            width: 100%;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: 1px dashed rgba(0,0,0,0.1);
            border-radius: 12px;
            color: rgba(0,0,0,0.5);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.2s;
        }
        .view-more-btn:hover {
            background: rgba(0,0,0,0.02);
            color: rgba(0,0,0,0.7);
            border-color: rgba(0,0,0,0.2);
        }

        .task-card .card-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.03);
            font-size: 22px;
        }

        .task-card .card-body {
            flex: 1;
            min-width: 0;
        }
        .task-card .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 3px;
            color: rgba(0,0,0,0.85);
        }
        .task-card .card-desc {
            font-size: 12px;
            color: rgba(0,0,0,0.45);
            line-height: 1.5;
        }

        .card-chevron {
            font-size: 16px;
            color: rgba(0,0,0,0.2);
            flex-shrink: 0;
            transition: transform 0.2s, color 0.2s;
        }
        .task-card:hover .card-chevron {
            color: rgba(0,0,0,0.4);
            transform: translateX(2px);
        }

        /* ── Warning card (yellow – mid-month reminder) ── */
        .task-card.warning {
            border: 1.5px solid rgba(234,179,8,0.5);
            box-shadow: 0 8px 32px rgba(234,179,8,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
            background: rgba(254,252,232,0.55);
        }
        .task-card.warning:hover {
            border-color: rgba(234,179,8,0.65);
            box-shadow: 0 12px 40px rgba(234,179,8,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
            background: rgba(254,252,232,0.75);
        }
        .task-card.warning .card-icon {
            background: rgba(234,179,8,0.08);
        }

        /* ── Urgent card (red – month-end reminder) ── */
        .task-card.urgent {
            border: 1.5px solid rgba(239,68,68,0.5);
            box-shadow: 0 8px 32px rgba(239,68,68,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
            background: rgba(255,245,245,0.5);
        }
        .task-card.urgent:hover {
            border-color: rgba(239,68,68,0.65);
            box-shadow: 0 12px 40px rgba(239,68,68,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
            background: rgba(255,245,245,0.7);
        }
        .task-card.urgent .card-icon {
            background: rgba(239,68,68,0.06);
        }

        .card-hint {
            display: none;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .card-hint .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }
        .task-card.warning .card-hint {
            display: inline-flex;
            color: rgba(161,98,7,0.8);
        }
        .task-card.warning .card-hint .dot {
            background: rgba(234,179,8,0.7);
        }
        .task-card.urgent .card-hint {
            display: inline-flex;
            color: rgba(220,38,38,0.75);
        }
        .task-card.urgent .card-hint .dot {
            background: rgba(239,68,68,0.6);
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ── Success banner (month-end all done) ── */
        .success-banner {
            display: none;
            align-items: flex-start;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(240,253,244,0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(16,185,129,0.25);
            border-radius: 16px;
            margin: 12px 0 0;
            animation: fadeSlideIn 0.5s ease-out;
        }
        .success-banner.show { display: flex; }
        .success-banner .reminder-content { flex: 1; }
        .success-banner .reminder-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(5,150,105,0.9);
            margin-bottom: 3px;
        }
        .success-banner .reminder-desc {
            font-size: 12px;
            color: rgba(6,95,70,0.7);
            line-height: 1.6;
        }

        /* ── Empty Review State ── */
        .empty-review-card {
            background: rgba(240,253,244,0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(16,185,129,0.22);
            box-shadow: 0 8px 32px rgba(16,185,129,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .empty-review-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .empty-review-icon {
            font-size: 40px;
            margin-bottom: 12px;
            line-height: 1;
        }
        .empty-review-title {
            font-size: 15px;
            font-weight: 700;
            color: rgba(5,150,105,0.9);
            margin-bottom: 6px;
        }
        .empty-review-desc {
            font-size: 13px;
            color: rgba(6,95,70,0.55);
            line-height: 1.7;
        }

        /* Card in all-done state */
        .task-card.all-done {
            border-color: rgba(16,185,129,0.3);
            background: rgba(240,253,244,0.4);
        }
        .task-card.all-done:hover {
            border-color: rgba(16,185,129,0.45);
            background: rgba(240,253,244,0.6);
        }
        .task-card.all-done .card-icon {
            background: rgba(16,185,129,0.08);
        }
        .task-card.all-done .count-number {
            color: rgba(5,150,105,0.85);
        }
        .task-card.all-done .count-label {
            color: rgba(5,150,105,0.5);
        }

        /* ── Test Case Button (bottom-right) ── */
        .fab-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .fab-btn button {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: none;
            box-shadow: 0 8px 32px rgba(31,38,135,0.08), inset 0 1px 0 rgba(255,255,255,0.5);
            border-radius: 12px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
            font-family: inherit;
        }
        .fab-btn button:hover {
            background: rgba(255,255,255,0.8);
            box-shadow: 0 8px 32px rgba(31,38,135,0.14), inset 0 1px 0 rgba(255,255,255,0.7);
        }

        /* ── Test Case Panel ── */
        .test-panel {
            display: none;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 12px 48px rgba(31,38,135,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
            border-radius: 16px;
            padding: 16px 20px;
            min-width: 240px;
        }
        .test-panel.show { display: block; }
        .test-panel-title {
            font-size: 12px;
            font-weight: 700;
            color: rgba(0,0,0,0.7);
            margin-bottom: 10px;
        }
        .test-btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 6px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            background: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: 500;
            color: rgba(0,0,0,0.6);
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: all 0.15s;
        }
        .test-btn:last-child { margin-bottom: 0; }
        .test-btn:hover {
            background: rgba(0,0,0,0.04);
            color: rgba(0,0,0,0.8);
        }
        .test-btn.active {
            background: rgba(79,70,229,0.08);
            border-color: rgba(79,70,229,0.2);
            color: rgba(79,70,229,0.9);
            font-weight: 600;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .scroll-inner { padding: 50px 20px 40px; }
            .date-main { font-size: 26px; }
        }
    </style>
</head>
<body>
<div class="ds3-ui-layer">
    <!-- User Badge -->
    <div class="user-badge">
        <button>
            <span class="avatar">ZM</span>
            <div class="user-info">
                <span class="user-name">张明</span>
                <span class="user-role">Finance Specialist</span>
            </div>
            <span class="dropdown-arrow">▾</span>
        </button>
    </div>

    <!-- Main Scrollable Area -->
    <div class="scroll-area">
        <div class="scroll-inner">
            <div class="content">
                <!-- Date Block -->
                <div class="date-block">
                    <div class="date-main" id="dateMain"></div>
                    <div class="date-sub" id="dateSub"></div>
                </div>

                <!-- Greeting Lines -->
                <div class="greeting-line" id="greeting1"></div>
                <div class="greeting-line" id="greeting2"></div>

                <!-- Success Banner (month-end all done only) -->
                <div class="success-banner" id="successBanner">
                    <span class="reminder-icon">✅</span>
                    <div class="reminder-content">
                        <div class="reminder-title" id="successTitle"></div>
                        <div class="reminder-desc" id="successDesc"></div>
                    </div>
                </div>

                <!-- Task Cards -->
                <div id="taskList"></div>
            </div>
        </div>
    </div>

    <!-- Test Case FAB -->
    <div class="fab-btn">
        <div class="test-panel" id="testPanel">
            <div class="test-panel-title">🧪 Simulate Date Scenario</div>
            <button class="test-btn active" id="btnToday" onclick="simulateDate('today')">📅 Today</button>
            <button class="test-btn" onclick="simulateDate('mid')">⚠️ Mid-month (15th Morning)</button>
            <button class="test-btn" onclick="simulateDate('end')">🔴 Month-end (Last Day Morning)</button>
            <button class="test-btn" onclick="simulateDate('done')">🎉 Month-end Settlement</button>
            <button class="test-btn" onclick="simulateDate('empty')">✨ No Review Tasks (All Cleared)</button>
        </div>
        <button onclick="toggleTestPanel()">🧪 Test Case</button>
    </div>
</div>

<script>
    const today = new Date();
    const dayOfMonth = today.getDate();
    const month = today.getMonth();
    const year = today.getFullYear();
    const weekDays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const monthNames = ['01','02','03','04','05','06','07','08','09','10','11','12'];
    const currentUser = '张明';

    // ── Mock Data ──
    const currencySymbol = { JPY: '¥', SGD: 'S$', USD: '$' };
    function fmtAmt(inv) { return `${inv.currency} ${currencySymbol[inv.currency] || ''}${inv.amount}`; }

    // 待审核：所有财务可见
    const pendingInvoices = [
        { id: 'INV-2026-04-001', account: 'エムスリーキャリア株式会社', amount: '33,000', currency: 'JPY' },
        { id: 'INV-2026-04-002', account: '株式会社リクルート', amount: '128,700', currency: 'JPY' },
        { id: 'INV-2026-04-003', account: 'AWS Japan 合同会社', amount: '456,200', currency: 'JPY' },
    ];

    // 已审核：仅显示当前用户审核通过的
    const approvedInvoices = [
        { id: 'INV-2026-04-010', account: 'Google Cloud Japan', amount: '89,100', currency: 'JPY', reviewer: '张明' },
        { id: 'INV-2026-04-011', account: '株式会社マイナビ', amount: '55,000', currency: 'JPY', reviewer: '张明' },
    ];

    // 打款：当前用户审核过的 invoice，每条独立卡片，月底查 JE 判断是否完成
    const paymentInvoices = [
        { id: 'INV-2026-03-045', account: 'Slack Technologies', amount: '2,150.00', currency: 'USD', jeLinked: false },
        { id: 'INV-2026-03-046', account: 'Salesforce Japan', amount: '185,000', currency: 'JPY', jeLinked: false },
        { id: 'INV-2026-03-048', account: 'Microsoft Singapore', amount: '3,800.00', currency: 'SGD', jeLinked: false },
        { id: 'INV-2026-03-049', account: 'Oracle Corporation', amount: '45,000', currency: 'JPY', jeLinked: false },
        { id: 'INV-2026-03-047', account: 'Adobe Systems', amount: '67,500', currency: 'JPY', jeLinked: true },
    ];

    // ── Render Date ──
    document.getElementById('dateMain').textContent =
        `${monthNames[month]}/${String(dayOfMonth).padStart(2,'0')}/${year}`;
    document.getElementById('dateSub').textContent = weekDays[today.getDay()];

    // ── Typewriter ──
    function typewrite(el, text, delay) {
        return new Promise(resolve => {
            setTimeout(() => {
                let i = 0;
                el.innerHTML = '';
                function tick() {
                    if (i < text.length) {
                        el.innerHTML = text.slice(0, i + 1) + '<span class="typewriter-cursor"></span>';
                        i++;
                        setTimeout(tick, 25 + Math.random() * 15);
                    } else {
                        el.textContent = text;
                        resolve();
                    }
                }
                tick();
            }, delay);
        });
    }

    // ── Greeting ──
    function getGreetingText(isSettlement, pendingReviewCount, pendingPaymentCount, scenario) {
        if (isSettlement) return 'Hi, month-end settlement is done 🎉';
        if (scenario === 'empty') return '今日审核任务已全部清零，继续保持好节奏 😊';
        return `Hi, here are your tasks today: ${pendingReviewCount} pending review, ${pendingPaymentCount} pending payment.`;
    }

    typewrite(document.getElementById('greeting1'), 'Hi 👋', 200)
        .then(() => {
            let pendingReviewCount = pendingInvoices.length;
            let pendingPaymentCount = approvedInvoices.filter(inv => inv.reviewer === currentUser).length + paymentInvoices.filter(p => !p.jeLinked).length;
            typewrite(document.getElementById('greeting2'), getGreetingText(false, pendingReviewCount, pendingPaymentCount), 100);
        });

    let currentSimDay = dayOfMonth;
    let currentScenario = 'normal';
    let isExpanded = false;

    function toggleExpand() {
        isExpanded = !isExpanded;
        renderAll(currentSimDay, currentScenario);
    }

    // ── Render ──
    // scenario: 'normal' | 'settlement' (month-end 18:00 settlement – all reviews done, partial payments)
    function renderAll(simDay, scenario) {
        currentSimDay = simDay;
        currentScenario = scenario;
        const taskList = document.getElementById('taskList');
        // Mid-month: 15th to day before last day
        // Month-end: last day of month
        const isMidMonth = simDay >= 15 && simDay < 28; // using 28 as mock last day in test panel
        const isMonthEnd = simDay >= 28;
        const isSettlement = scenario === 'settlement';

        // Base counts
        let pendingReviewCount = pendingInvoices.length;
        
        let pendingPaymentsList = [
            ...approvedInvoices.filter(inv => inv.reviewer === currentUser),
            ...paymentInvoices.filter(p => !p.jeLinked)
        ];
        
        let paymentCompletedCount = paymentInvoices.filter(p => p.jeLinked).length;

        // Settlement mock modifications
        if (isSettlement) {
            let newApproved = pendingInvoices.map(inv => ({...inv, reviewer: currentUser}));
            pendingPaymentsList = [...pendingPaymentsList, ...newApproved];
            pendingReviewCount = 0;

            // 1 payment completes
            if (pendingPaymentsList.length > 0) {
                pendingPaymentsList.shift(); // remove the first one to simulate it being paid
                paymentCompletedCount += 1;
            }
        }
        
        let pendingPaymentCount = pendingPaymentsList.length;

        let html = '<div class="task-list">';
        let cardIdx = 0;

        // ── 1. Pending Review ──
        const jeReviewCount = (scenario === 'empty') ? 0 : 2;
        const hasReviewTasks = pendingReviewCount > 0 || jeReviewCount > 0;

        html += `<div class="section-label">📋 Pending Review</div>`;
        if (!hasReviewTasks) {
            html += `
            <div class="empty-review-card" id="emptyReviewCard"
                 style="transition: opacity 0.5s ease ${cardIdx * 80}ms, transform 0.5s ease ${cardIdx * 80}ms;">
                <div class="empty-review-icon">🎉</div>
                <div class="empty-review-title">今日 Invoice、JE 审核任务已清零</div>
                <div class="empty-review-desc">工作进度正常，期待今日继续保持 ✨</div>
            </div>`;
            cardIdx++;
        } else {
            html += `<div class="task-list">`;
            if (pendingReviewCount > 0) {
                html += `
                <a class="task-card" href="F-PAP-PAYMENT-REVIEW.html" target="_blank"
                   style="transition: opacity 0.5s ease ${cardIdx * 80}ms, transform 0.5s ease ${cardIdx * 80}ms, background 0.2s, box-shadow 0.2s;">
                    <span class="card-icon">📋</span>
                    <div class="card-body">
                        <div class="card-title">Invoice Review</div>
                        <div class="card-desc">${pendingReviewCount} invoice(s)</div>
                    </div>
                    <span class="card-chevron">›</span>
                </a>`;
                cardIdx++;
            }
            html += `
            <a class="task-card" href="F-JE-REVIEW-CHAT.html" target="_blank"
               style="transition: opacity 0.5s ease ${cardIdx * 80}ms, transform 0.5s ease ${cardIdx * 80}ms, background 0.2s, box-shadow 0.2s;">
                <span class="card-icon">📊</span>
                <div class="card-body">
                    <div class="card-title">JE Review</div>
                    <div class="card-desc">${jeReviewCount} JE(s)</div>
                </div>
                <span class="card-chevron">›</span>
            </a>`;
            cardIdx++;
            html += `</div>`;
        }

        // ── 2. Pending Payment ──
        if (pendingPaymentsList.length > 0) {
            html += `<div class="section-label">💰 Pending Payment</div>`;
            html += `<div class="task-list">`;
            
            const displayList = isExpanded ? pendingPaymentsList : pendingPaymentsList.slice(0, 5);

            displayList.forEach(inv => {
                let cls = ' compact';
                let hint = '';
                if (isMonthEnd && !isSettlement) {
                    cls += ' urgent';
                    hint = `<div class="card-hint"><span class="dot"></span>Month-end approaching</div>`;
                } else if (isMidMonth && !isSettlement) {
                    cls += ' warning';
                    hint = `<div class="card-hint"><span class="dot"></span>Remember to make payment</div>`;
                }
                
                html += `
                <a class="task-card${cls}" href="javascript:alert('跳转至 F System 的 Invoice 管理列表页');"
                   style="transition: opacity 0.5s ease ${cardIdx * 80}ms, transform 0.5s ease ${cardIdx * 80}ms, background 0.2s, box-shadow 0.2s, border-color 0.3s;">
                    <span class="card-icon">💰</span>
                    <div class="card-body">
                        <div class="card-title">${inv.account} Payment</div>
                        <div class="card-desc">Payment Amount ${fmtAmt(inv)}</div>
                        ${hint}
                    </div>
                    <span class="card-chevron">›</span>
                </a>`;
                cardIdx++;
            });

            if (pendingPaymentsList.length > 5) {
                const btnText = isExpanded ? 'Show Less' : `View More (${pendingPaymentsList.length - 5} more)`;
                html += `<button class="view-more-btn" onclick="toggleExpand()">${btnText}</button>`;
            }
            html += `</div>`;
        }

        // ── 3. Payment Completed ──
        if (paymentCompletedCount > 0 || isSettlement) {
            html += `<div class="section-label">✅ Payment Completed</div>`;
            html += `<div class="task-list">`;
            html += `
            <a class="task-card all-done" href="javascript:alert('跳转至 F System 的 Invoice 管理列表页');"
               style="transition: opacity 0.5s ease ${cardIdx * 80}ms, transform 0.5s ease ${cardIdx * 80}ms, background 0.2s;">
                <span class="card-icon">✅</span>
                <div class="card-body">
                    <div class="card-title">Payment Completed</div>
                    <div class="card-desc">${paymentCompletedCount} invoice(s)</div>
                </div>
            </a>`;
            html += `</div>`;
            cardIdx++;
        }

        html += '</div>';
        taskList.innerHTML = html;

        setTimeout(() => {
            taskList.querySelectorAll('.task-card').forEach((card, i) => {
                setTimeout(() => card.classList.add('visible'), i * 80);
            });
            const emptyCard = document.getElementById('emptyReviewCard');
            if (emptyCard) setTimeout(() => emptyCard.classList.add('visible'), 80);
        }, 100);

        // Success banner
        const successBanner = document.getElementById('successBanner');
        successBanner.classList.remove('show');
        if (isSettlement) {
            document.getElementById('successTitle').textContent = 'Month-end Settlement Completed';
            document.getElementById('successDesc').innerHTML =
                `All invoices reviewed. ${paymentCompletedCount} payment(s) completed, <span style="color:#dc2626;font-weight:600">${pendingPaymentCount} still pending</span>.`;
            successBanner.classList.add('show');
        }

        document.getElementById('greeting2').textContent = getGreetingText(isSettlement, pendingReviewCount, pendingPaymentCount, scenario);
    }

    renderAll(dayOfMonth, 'normal');
    document.getElementById('btnToday').textContent = `📅 Today (${monthNames[month]}/${dayOfMonth})`;

    // ── Test Case Panel ──
    function toggleTestPanel() {
        document.getElementById('testPanel').classList.toggle('show');
    }

    function simulateDate(scenario) {
        document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        let simDay, scn = 'normal', dateLabel;
        switch(scenario) {
            case 'mid':
                simDay = 15;
                dateLabel = `${monthNames[month]}/15/${year}`;
                document.getElementById('dateSub').textContent = 'Simulate: 15th Morning';
                break;
            case 'end':
                simDay = 28;
                dateLabel = `${monthNames[month]}/28/${year}`;
                document.getElementById('dateSub').textContent = 'Simulate: Last Day Morning';
                break;
            case 'done':
                simDay = 31; scn = 'settlement';
                dateLabel = `${monthNames[month]}/28/${year}`;
                document.getElementById('dateSub').textContent = 'Simulate: Settlement (18:00)';
                break;
            case 'empty':
                simDay = dayOfMonth; scn = 'empty';
                dateLabel = `${monthNames[month]}/${String(dayOfMonth).padStart(2,'0')}/${year}`;
                document.getElementById('dateSub').textContent = weekDays[today.getDay()];
                break;
            default:
                simDay = dayOfMonth;
                dateLabel = `${monthNames[month]}/${String(dayOfMonth).padStart(2,'0')}/${year}`;
                document.getElementById('dateSub').textContent = weekDays[today.getDay()];
        }
        document.getElementById('dateMain').textContent = dateLabel;
        renderAll(simDay, scn);
        document.getElementById('testPanel').classList.remove('show');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-System 3.0 — AI Agent 工作台 Demo v3</title>
    <style>
        :root { --ds3-accent-blue:#007aff; --ds3-accent-purple:#af52de; --ds3-success:#34c759; --ds3-warning:#ff9f0a; --ds3-error:#ff3b30; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:linear-gradient(160deg,#f0f4f8,#e8edf5 50%,#f5f0fa);color:rgba(0,0,0,0.85);height:100vh;overflow:hidden;}
        .ds3-root{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        .glass{background:rgba(255,255,255,0.25);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.5);box-shadow:0 8px 32px rgba(31,38,135,0.08),inset 0 1px 0 rgba(255,255,255,0.5);}
        .glass-strong{background:rgba(255,255,255,0.45);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,0.6);box-shadow:0 8px 32px rgba(31,38,135,0.1),inset 0 1px 0 rgba(255,255,255,0.5);}
        .ds3-scrollbar::-webkit-scrollbar{width:4px;}.ds3-scrollbar::-webkit-scrollbar-track{background:transparent;}.ds3-scrollbar::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px;}

        .user-switcher{position:absolute;top:16px;left:16px;z-index:100;}
        .user-btn{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 6px;border-radius:20px;border:1px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.3);backdrop-filter:blur(20px) saturate(180%);box-shadow:0 4px 16px rgba(31,38,135,0.06),inset 0 1px 0 rgba(255,255,255,0.5);color:rgba(0,0,0,0.8);cursor:pointer;font-size:13px;font-weight:500;}
        .user-avatar{width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
        .user-avatar.worker{background:rgba(0,122,255,0.12);color:#007aff;}.user-avatar.dm{background:rgba(175,82,222,0.12);color:#af52de;}.user-avatar.maintainer{background:rgba(52,199,89,0.12);color:#34c759;}
        .user-dropdown{position:absolute;top:44px;left:0;padding:4px;border-radius:16px;min-width:220px;background:rgba(255,255,255,0.65);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,0.6);box-shadow:0 8px 32px rgba(31,38,135,0.1),inset 0 1px 0 rgba(255,255,255,0.5);display:none;}
        .user-dropdown.show{display:block;animation:fadeSlideIn .2s ease;}
        .user-dropdown-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;border-radius:10px;background:transparent;color:rgba(0,0,0,0.7);cursor:pointer;font-size:13px;text-align:left;font-weight:500;}
        .user-dropdown-item:hover{background:rgba(0,0,0,0.04);}.user-dropdown-item.active{background:rgba(0,122,255,0.08);color:#007aff;}
        .user-dropdown-item .role-label{font-size:11px;opacity:0.45;}

        .main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:50px 40px 40px;}
        .stream-center{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
        .wide-center{max-width:960px;margin:0 auto;}
        .date-main{font-size:32px;font-weight:800;color:rgba(0,0,0,0.85);line-height:1.2;}
        .date-sub{font-size:14px;font-weight:500;color:rgba(0,0,0,0.35);margin-top:4px;}
        .stream-text{font-size:16px;line-height:1.9;white-space:pre-wrap;}
        .stream-text.current{color:rgba(0,0,0,0.8);font-weight:500;}.stream-text.done{color:rgba(0,0,0,0.35);transition:color .6s ease;}.stream-text.spacer{height:12px;}
        .cursor-blink{display:inline-block;width:2px;height:18px;background:rgba(0,0,0,0.7);margin-left:2px;vertical-align:text-bottom;animation:cursorBlink .8s step-end infinite;}

        .task-cards{display:flex;flex-direction:column;gap:10px;margin:20px 0;}
        .task-card{border-radius:20px;padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s ease;opacity:0;transform:translateY(12px);}
        .task-card.visible{opacity:1;transform:translateY(0);}
        .task-card:hover{background:rgba(255,255,255,0.65)!important;transform:translateY(-2px);box-shadow:0 12px 40px rgba(31,38,135,0.15),inset 0 1px 0 rgba(255,255,255,0.6);}
        .task-card-icon{width:48px;height:48px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.03);font-size:22px;}
        .task-card-body{flex:1;min-width:0;}.task-card-title{font-size:15px;font-weight:700;margin-bottom:3px;}.task-card-title.completed{color:rgba(0,0,0,0.4);}
        .task-card-desc{font-size:12px;color:rgba(0,0,0,0.45);line-height:1.5;}
        .task-card-pending{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
        .task-card-num{font-size:18px;font-weight:800;color:rgba(0,0,0,0.7);line-height:1;}.task-card-label{font-size:9px;font-weight:600;color:rgba(0,0,0,0.3);letter-spacing:.3px;}
        .task-card-arrow{font-size:16px;color:rgba(0,0,0,0.2);flex-shrink:0;}
        .task-ref{display:flex;align-items:center;gap:8px;margin-top:16px;margin-bottom:4px;opacity:0;animation:slideIn .3s ease-out forwards;}
        .task-ref-icon{font-size:14px;}.task-ref-label{font-size:12px;font-weight:700;color:rgba(0,0,0,0.55);letter-spacing:.3px;}

        .email-inline{border-radius:18px;padding:18px 22px;margin:8px 0 16px;border-left:3px solid var(--ds3-accent-purple);opacity:0;animation:slideIn .5s ease .1s forwards;}
        .email-inline-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
        .email-inline-icon{width:28px;height:28px;border-radius:8px;background:rgba(175,82,222,0.1);display:flex;align-items:center;justify-content:center;font-size:13px;}
        .email-inline-sender{font-size:13px;font-weight:600;color:rgba(0,0,0,0.8);}
        .email-inline-tag{font-size:9px;font-weight:700;letter-spacing:.4px;padding:2px 6px;border-radius:5px;}
        .email-inline-tag.urgent{background:rgba(255,59,48,0.1);color:#ff3b30;border:1px solid rgba(255,59,48,0.2);}
        .email-inline-tag.normal{background:rgba(0,0,0,0.03);color:rgba(0,0,0,0.4);border:1px solid rgba(0,0,0,0.06);}
        .email-inline-time{font-size:12px;color:rgba(0,0,0,0.3);margin-left:auto;}
        .email-inline-subject{font-size:14px;font-weight:600;margin-bottom:4px;}
        .email-inline-summary{font-size:13px;color:rgba(0,0,0,0.5);line-height:1.6;margin-bottom:12px;}
        .email-draft-box{padding:12px 16px;border-radius:12px;margin-bottom:12px;background:rgba(175,82,222,0.04);border:1px solid rgba(175,82,222,0.12);}
        .email-draft-label{font-size:10px;font-weight:700;color:var(--ds3-accent-purple);letter-spacing:.3px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
        .email-draft-text{font-size:12px;color:rgba(0,0,0,0.5);line-height:1.6;}
        .email-inline-actions{display:flex;gap:8px;}
        .cross-action{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;margin:4px 0;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);backdrop-filter:blur(8px);opacity:0;animation:slideIn .4s ease forwards;}
        .cross-action-sys{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;color:#fff;}
        .cross-action-sys.a-sys{background:var(--ds3-accent-blue);}.cross-action-sys.cal{background:var(--ds3-warning);}
        .cross-action-text{flex:1;font-size:13px;color:rgba(0,0,0,0.7);line-height:1.5;}

        .btn{padding:7px 16px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
        .btn-primary{background:rgba(175,82,222,0.15);color:#af52de;border:1px solid rgba(175,82,222,0.2);}.btn-primary:hover{background:rgba(175,82,222,0.25);}
        .btn-blue{background:rgba(0,122,255,0.12);color:#007aff;border:1px solid rgba(0,122,255,0.2);}.btn-blue:hover{background:rgba(0,122,255,0.2);}
        .btn-outline{background:rgba(0,122,255,0.1);color:#007aff;border:1px solid rgba(0,122,255,0.2);}.btn-outline:hover{background:rgba(0,122,255,0.2);}
        .btn-ghost{background:rgba(0,0,0,0.04);color:rgba(0,0,0,0.5);border:1px solid rgba(0,0,0,0.06);}.btn-ghost:hover{background:rgba(0,0,0,0.08);}
        .btn-sm{padding:5px 12px;font-size:11px;border-radius:10px;}
        .btn-green{background:rgba(52,199,89,0.12);color:#34c759;border:1px solid rgba(52,199,89,0.2);}.btn-green:hover{background:rgba(52,199,89,0.22);}

        .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
        .metric-card{border-radius:14px;padding:14px 16px;}.metric-label{font-size:10px;font-weight:600;color:rgba(0,0,0,0.35);text-transform:uppercase;letter-spacing:.5px;}
        .metric-value{font-size:24px;font-weight:800;color:rgba(0,0,0,0.7);margin-top:4px;}.metric-sub{font-size:10px;color:rgba(0,0,0,0.35);margin-top:4px;}
        .alert-card{border-radius:14px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
        .alert-icon{font-size:18px;flex-shrink:0;}.alert-body{flex:1;}.alert-title{font-size:13px;font-weight:600;color:rgba(0,0,0,0.8);}.alert-desc{font-size:11px;color:rgba(0,0,0,0.4);margin-top:2px;}
        .team-table{width:100%;border-collapse:separate;border-spacing:0;}
        .team-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;color:rgba(0,0,0,0.35);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(0,0,0,0.06);}
        .team-table td{padding:10px 14px;font-size:13px;color:rgba(0,0,0,0.7);border-bottom:1px solid rgba(0,0,0,0.04);}
        .team-table tr:hover td{background:rgba(255,255,255,0.3);}
        .status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;}
        .status-badge.good{background:rgba(52,199,89,0.1);color:#34c759;}.status-badge.warn{background:rgba(255,159,10,0.1);color:#ff9f0a;}.status-badge.bad{background:rgba(255,59,48,0.1);color:#ff3b30;}
        .dept-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;}
        .dept-tag.bd{background:rgba(0,122,255,0.08);color:#007aff;}.dept-tag.cs{background:rgba(175,82,222,0.08);color:#af52de;}.dept-tag.ops{background:rgba(255,159,10,0.08);color:#ff9f0a;}.dept-tag.pm{background:rgba(52,199,89,0.08);color:#34c759;}

        .m-panels{display:flex;gap:12px;height:calc(100vh - 210px);min-height:480px;}
        .m-panel-left{width:270px;flex-shrink:0;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;}
        .m-panel-right{flex:1;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;}
        .m-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.04);flex-shrink:0;}
        .m-panel-body{flex:1;overflow-y:auto;padding:6px;}
        .wf-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:2px;cursor:pointer;transition:all .15s;}
        .wf-item:hover{background:rgba(0,0,0,0.03);}.wf-item.active{background:rgba(0,122,255,0.06);}
        .wf-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0;}.wf-dot.on{background:var(--ds3-success);}.wf-dot.off{background:rgba(0,0,0,0.15);}
        .wf-body{flex:1;min-width:0;}.wf-name{font-size:13px;font-weight:600;color:rgba(0,0,0,0.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .wf-info{font-size:10px;color:rgba(0,0,0,0.35);margin-top:2px;}
        .wf-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;}.wf-tag.email{background:rgba(175,82,222,0.1);color:#af52de;}.wf-tag.cross{background:rgba(0,122,255,0.1);color:#007aff;}.wf-tag.kb{background:rgba(52,199,89,0.1);color:#34c759;}

        .chat-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.04);flex-shrink:0;}
        .chat-header-icon{font-size:16px;}.chat-header-title{font-size:14px;font-weight:600;color:rgba(0,0,0,0.7);}.chat-header-sub{font-size:11px;color:rgba(0,0,0,0.3);margin-left:auto;}
        .chat-messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
        .chat-msg{display:flex;gap:10px;max-width:92%;}.chat-msg.ai{align-self:flex-start;}.chat-msg.user{align-self:flex-end;flex-direction:row-reverse;}
        .chat-av{width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
        .chat-av.ai{background:rgba(52,199,89,0.12);color:#34c759;}.chat-av.user{background:rgba(0,122,255,0.12);color:#007aff;}
        .chat-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.7;white-space:pre-line;}
        .chat-bubble.ai{background:rgba(0,0,0,0.035);border:1px solid rgba(0,0,0,0.05);border-top-left-radius:4px;}
        .chat-bubble.user{background:rgba(0,122,255,0.07);border:1px solid rgba(0,122,255,0.1);border-top-right-radius:4px;color:rgba(0,0,0,0.75);}
        .wf-summary{border-radius:16px;padding:16px 20px;margin:2px 0;background:rgba(255,255,255,0.5);border:1px solid rgba(52,199,89,0.2);}
        .wf-summary-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
        .wf-summary-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}.wf-summary-label{font-size:11px;font-weight:600;color:rgba(0,0,0,0.4);min-width:72px;flex-shrink:0;}
        .wf-summary-value{font-size:12px;color:rgba(0,0,0,0.65);line-height:1.5;}.wf-summary-actions{display:flex;gap:8px;margin-top:14px;}
        .scope-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}.scope-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.06);color:rgba(0,0,0,0.5);}
        .scope-tag.selected{background:rgba(0,122,255,0.08);border-color:rgba(0,122,255,0.2);color:#007aff;}
        .chat-input-area{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid rgba(0,0,0,0.04);flex-shrink:0;}
        .chat-input{flex:1;padding:8px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.08);background:rgba(0,0,0,0.02);font-size:13px;font-family:inherit;outline:none;}
        .chat-input:focus{border-color:rgba(0,122,255,0.3);background:rgba(255,255,255,0.5);}
        .chat-send-btn{width:32px;height:32px;border-radius:16px;border:none;background:var(--ds3-accent-blue);color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

        .dm-tabs{display:flex;gap:4px;margin-bottom:24px;padding:3px;border-radius:14px;width:fit-content;}
        .dm-tab{padding:7px 18px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:rgba(0,0,0,0.4);transition:all .15s;}
        .dm-tab.active{background:rgba(0,0,0,0.08);color:rgba(0,0,0,0.7);}
        .section-label{font-size:11px;font-weight:600;color:rgba(0,0,0,0.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}

        .view{display:none;height:100%;}.view.active{display:flex;flex-direction:column;}

        .panel-overlay{position:fixed;inset:0;z-index:200;background:rgba(240,244,248,0.6);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding-top:60px;}
        .panel-overlay.show{display:flex;animation:fadeIn .2s ease;}
        .panel-content{position:relative;border-radius:24px;width:100%;max-width:560px;max-height:calc(100vh - 120px);display:flex;flex-direction:column;overflow:hidden;animation:panelIn .35s ease-out;}
        .panel-header{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid rgba(0,0,0,0.04);flex-shrink:0;}
        .panel-body{flex:1;overflow-y:auto;padding:16px 24px 20px;}
        .panel-footer{padding:14px 24px;border-top:1px solid rgba(0,0,0,0.04);display:flex;gap:8px;flex-shrink:0;}.panel-footer .btn{flex:1;text-align:center;padding:10px;}
        .panel-close{width:30px;height:30px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);background:rgba(0,0,0,0.03);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.35);}
        .panel-meta{margin-bottom:14px;}.panel-meta-row{display:flex;gap:8px;margin-bottom:5px;font-size:13px;}.panel-meta-label{color:rgba(0,0,0,0.35);min-width:48px;}.panel-meta-value{color:rgba(0,0,0,0.7);font-weight:500;}
        .panel-divider{height:1px;background:rgba(0,0,0,0.06);margin:14px 0;}
        .panel-section-label{font-size:10px;font-weight:700;color:rgba(0,0,0,0.3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
        .panel-original{font-size:13px;line-height:1.7;white-space:pre-line;padding:14px;border-radius:12px;background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);}

        /* ===== BOTTOM-RIGHT CONTROLS ===== */
        .bottom-controls{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
        .ctrl-btn{border-radius:12px;padding:8px 16px;border:none;background:rgba(255,255,255,0.6);backdrop-filter:blur(20px) saturate(180%);box-shadow:0 8px 32px rgba(31,38,135,0.08),inset 0 1px 0 rgba(255,255,255,0.5);cursor:pointer;font-size:11px;font-weight:600;color:rgba(0,0,0,0.5);transition:all .15s;}
        .ctrl-btn:hover{background:rgba(255,255,255,0.8);}
        .ctrl-btn.active-char{background:rgba(0,122,255,0.1);color:#007aff;border:1px solid rgba(0,122,255,0.15);}
        .ctrl-menu{border-radius:16px;padding:12px 6px;min-width:240px;background:rgba(255,255,255,0.75);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.6);box-shadow:0 8px 32px rgba(31,38,135,0.1);display:none;}
        .ctrl-menu.show{display:block;animation:fadeSlideIn .2s ease;}
        .ctrl-menu-title{font-size:9px;font-weight:700;color:rgba(0,0,0,0.3);text-transform:uppercase;letter-spacing:1px;padding:4px 12px 6px;border-bottom:1px solid rgba(0,0,0,0.06);margin-bottom:4px;}
        .ctrl-menu-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;border:none;width:100%;background:transparent;cursor:pointer;text-align:left;transition:background .15s;}
        .ctrl-menu-item:hover{background:rgba(0,0,0,0.03);}.ctrl-menu-item.active{background:rgba(0,0,0,0.06);}
        .ctrl-menu-item .ci-icon{font-size:16px;width:28px;text-align:center;}
        .ctrl-menu-item .ci-name{font-size:12px;font-weight:600;color:rgba(0,0,0,0.7);}
        .ctrl-menu-item .ci-desc{font-size:10px;color:rgba(0,0,0,0.35);margin-top:1px;}
        .case-id{font-size:10px;font-weight:700;color:rgba(0,0,0,0.4);min-width:48px;}.case-desc{font-size:11px;color:rgba(0,0,0,0.5);font-weight:500;}
        .batch-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(0,122,255,0.06);color:var(--ds3-accent-blue);border:1px solid rgba(0,122,255,0.1);margin-bottom:12px;}

        @keyframes cursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}
        @keyframes slideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

let curChar = 'bd';

/* ===== USER SWITCHER ===== */
function renderDropdown() {
    const c = ch();
    const items = [{role:'worker',...c.worker,cls:'worker'},{role:'dm',...c.dm,cls:'dm'},{role:'maintainer',...c.mt,cls:'maintainer'}];
    const dd = document.getElementById('userDropdown');
    dd.innerHTML = items.map(it => `<button class="user-dropdown-item ${it.role===curRole?'active':''}" data-role="${it.role}">
        <span class="user-avatar ${it.cls}" style="width:24px;height:24px;border-radius:12px;font-size:9px;">${it.avatar}</span>
        <div><div style="font-weight:600;">${it.name}</div><div class="role-label">${it.title}</div></div></button>`).join('');
    dd.querySelectorAll('.user-dropdown-item').forEach(item => item.addEventListener('click', () => switchRole(item.dataset.role)));
    const cur = items.find(i => i.role === curRole);
    document.getElementById('userName').textContent = cur.name;
    const av = document.getElementById('userAvatar');
    av.textContent = cur.avatar; av.className = 'user-avatar ' + cur.cls;
}
function switchRole(role) {
    curRole = role; renderDropdown();
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById({worker:'viewWorker',dm:'viewDM',maintainer:'viewMaintainer'}[role]).classList.add('active');
    document.getElementById('userDropdown').classList.remove('show');
    if (role === 'dm') renderDM();
    if (role === 'maintainer') initMaintainer();
}
document.getElementById('userBtn').onclick = () => document.getElementById('userDropdown').classList.toggle('show');
document.addEventListener('click', e => { if (!e.target.closest('.user-switcher')) document.getElementById('userDropdown').classList.remove('show'); if (!e.target.closest('.bottom-controls')) { document.getElementById('charMenu').classList.remove('show'); document.getElementById('caseMenu').classList.remove('show'); }});

/* ===== CHARACTER & CASE SWITCH ===== */
document.getElementById('charBtn').onclick = e => { e.stopPropagation(); document.getElementById('charMenu').classList.toggle('show'); document.getElementById('caseMenu').classList.remove('show'); };
document.getElementById('caseBtn').onclick = e => { e.stopPropagation(); document.getElementById('caseMenu').classList.toggle('show'); document.getElementById('charMenu').classList.remove('show'); };
document.querySelectorAll('#charMenu .ctrl-menu-item').forEach(item => item.addEventListener('click', () => {
    curChar = item.dataset.char;
    document.querySelectorAll('#charMenu .ctrl-menu-item').forEach(i => i.classList.remove('active')); item.classList.add('active');
    document.getElementById('charMenu').classList.remove('show');
    document.getElementById('charBtn').innerHTML = `👤 ${ch().label}`;
    renderDropdown();
    if (curRole === 'worker') runCase(curCase); if (curRole === 'dm') renderDM(); if (curRole === 'maintainer') initMaintainer();
}));
document.querySelectorAll('#caseMenu .ctrl-menu-item').forEach(item => item.addEventListener('click', () => {
    curCase = item.dataset.case;
    document.querySelectorAll('#caseMenu .ctrl-menu-item').forEach(i => i.classList.remove('active')); item.classList.add('active');
    document.getElementById('caseMenu').classList.remove('show');
    if (curRole === 'worker') runCase(curCase);
}));

    mc.querySelectorAll('.dm-tab').forEach(tab=>tab.addEventListener('click',()=>{
        mc.querySelectorAll('.dm-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');
        ['mTabWorkflows','mTabAgent','mTabLogs'].forEach(id=>document.getElementById(id).style.display='none');
        document.getElementById({workflows:'mTabWorkflows',agent:'mTabAgent',logs:'mTabLogs'}[tab.dataset.mtab]).style.display='block';
        if(tab.dataset.mtab==='agent')renderAgentList();
    }));
    document.getElementById('newWfBtn').onclick=()=>{curWfId='new';renderWfList();document.getElementById('wfChatTitle').textContent='新建工作流';document.getElementById('wfChatSub').textContent='';renderChat(wfChats['new'],document.getElementById('wfChat'));};
    renderWfList();selectWf(curWfId);renderAgentList();selectAgent(curAgentId);
}
function renderWfList(){const wfs=ch().mtData.workflows,c=document.getElementById('wfList');c.innerHTML=wfs.map(w=>`<div class="wf-item ${w.id===curWfId?'active':''}" data-wf="${w.id}"><div class="wf-dot ${w.on?'on':'off'}"></div><div class="wf-body"><div class="wf-name">${w.name}</div><div class="wf-info">${w.info}</div></div><span class="wf-tag ${w.tagCls}">${w.tag}</span></div>`).join('');c.querySelectorAll('.wf-item').forEach(el=>el.addEventListener('click',()=>selectWf(el.dataset.wf)));}
function renderAgentList(){const ags=ch().mtData.agents,c=document.getElementById('agentList');c.innerHTML=ags.map(a=>`<div class="wf-item ${a.id===curAgentId?'active':''}" data-agent="${a.id}"><div style="font-size:18px;flex-shrink:0;">${a.icon}</div><div class="wf-body"><div class="wf-name">${a.name}</div><div class="wf-info">${a.desc}</div></div></div>`).join('');c.querySelectorAll('.wf-item').forEach(el=>el.addEventListener('click',()=>selectAgent(el.dataset.agent)));}
function selectWf(id){curWfId=id;renderWfList();const wf=ch().mtData.workflows.find(w=>w.id===id);document.getElementById('wfChatTitle').textContent=wf?wf.name:'新建工作流';document.getElementById('wfChatSub').textContent=wf?'创建于 03/25':'';renderChat(wfChats[id]||wfChats['new'],document.getElementById('wfChat'));}
function selectAgent(id){curAgentId=id;renderAgentList();const a=ch().mtData.agents.find(x=>x.id===id);document.getElementById('agentChatTitle').textContent=a?a.name:'';document.getElementById('agentChatSub').textContent='上次修改 03/24';renderChat(agentChats[id]||[{role:'ai',text:`当前「${a?a.name:''}」Agent 运行正常。\n\n你想修改哪些配置？`}],document.getElementById('agentChat'));}
function renderChat(msgs,container){container.innerHTML='';msgs.forEach(msg=>{if(msg.role==='scope'){const el=document.createElement('div');el.className='chat-msg ai';el.innerHTML=`<div class="chat-av ai">AI</div><div><div class="scope-tags">${msg.tags.map(t=>`<span class="scope-tag ${t===msg.selected?'selected':''}">${t}</span>`).join('')}</div></div>`;container.appendChild(el);}else if(msg.role==='summary'){const d=msg.data,el=document.createElement('div');el.style.cssText='max-width:92%;';el.innerHTML=`<div class="wf-summary"><div class="wf-summary-title">📋 ${d.name}</div><div class="wf-summary-row"><span class="wf-summary-label">触发条件</span><span class="wf-summary-value">${d.trigger}</span></div><div class="wf-summary-row"><span class="wf-summary-label">应用范围</span><span class="wf-summary-value">${d.scope}</span></div><div class="wf-summary-row"><span class="wf-summary-label">执行策略</span><span class="wf-summary-value" style="white-space:pre-line;">${d.strategy}</span></div><div class="wf-summary-row"><span class="wf-summary-label">确认模式</span><span class="wf-summary-value">${d.confirm}</span></div><div class="wf-summary-actions"><button class="btn btn-green btn-sm">✓ 已确认创建</button><button class="btn btn-ghost btn-sm">继续编辑</button></div></div>`;container.appendChild(el);}else{const isAi=msg.role==='ai',el=document.createElement('div');el.className=`chat-msg ${isAi?'ai':'user'}`;el.innerHTML=`<div class="chat-av ${isAi?'ai':'user'}">${isAi?'AI':ch().mt.avatar}</div><div class="chat-bubble ${isAi?'ai':'user'}">${msg.text}</div>`;container.appendChild(el);}});container.scrollTop=container.scrollHeight;}

/* ===== EMAIL PANEL ===== */
function openPanel(){
    const p=ch().panelDetail,b=document.getElementById('panelBody');
    b.innerHTML=`<div class="panel-meta"><div class="panel-meta-row"><span class="panel-meta-label">发件人</span><span class="panel-meta-value">${p.from}</span></div><div class="panel-meta-row"><span class="panel-meta-label">主题</span><span class="panel-meta-value">${p.subject}</span></div><div class="panel-meta-row"><span class="panel-meta-label">时间</span><span class="panel-meta-value">${p.time}</span></div><div class="panel-meta-row"><span class="panel-meta-label">优先级</span><span class="email-inline-tag urgent">紧急</span></div></div><div class="panel-divider"></div><div class="panel-section-label">原始邮件</div><div class="panel-original">${p.original}</div><div class="panel-divider"></div><div class="panel-section-label">AI 生成草稿</div><div class="email-draft-box"><div class="email-draft-label">✦ AI Draft</div><div class="email-draft-text">${p.draft}</div></div>`;
    document.getElementById('emailPanel').classList.add('show');
}
function closePanel(){document.getElementById('emailPanel').classList.remove('show');}

/* ===== STREAM ENGINE ===== */
const sc=document.getElementById('streamContainer'),ws=document.getElementById('workerScroll');
let st=null;
function clearStream(){if(st)clearTimeout(st);sc.innerHTML='';}
function getDate(){const d=new Date(),days=['日','一','二','三','四','五','六'];return{full:`${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日`,weekday:`星期${days[d.getDay()]}`};}
function addDateHeader(){const{full,weekday}=getDate(),el=document.createElement('div');el.style.marginBottom='24px';el.innerHTML=`<div class="date-main">${full}</div><div class="date-sub">${weekday}</div>`;sc.appendChild(el);}
function addBatch(text,delay){return new Promise(r=>{st=setTimeout(()=>{const el=document.createElement('div');el.className='batch-badge';el.innerHTML=`⏰ ${text}`;el.style.opacity='0';el.style.animation='slideIn .3s ease forwards';sc.appendChild(el);scrollB();st=setTimeout(r,400);},delay);});}
function typeT(text,_,delay){return new Promise(r=>{st=setTimeout(()=>{if(!text){const s=document.createElement('div');s.className='stream-text spacer';sc.appendChild(s);scrollB();r();return;}const el=document.createElement('div');el.className='stream-text current';sc.appendChild(el);let i=0;const cur=document.createElement('span');cur.className='cursor-blink';const tick=()=>{i++;el.textContent=text.slice(0,i);el.appendChild(cur);scrollB();if(i<text.length)st=setTimeout(tick,28);else st=setTimeout(()=>{el.className='stream-text done';cur.remove();r();},400);};tick();},delay);});}
function addCards(cd,delay){return new Promise(r=>{st=setTimeout(()=>{const wrap=document.createElement('div');wrap.className='task-cards';cd.forEach((t,i)=>{const card=document.createElement('div');card.className='task-card glass';card.onclick=t.id==='email'?openPanel:null;const done=t.pending===0;card.innerHTML=`<div class="task-card-icon">${t.icon}</div><div class="task-card-body"><div class="task-card-title ${done?'completed':''}">${t.title}</div><div class="task-card-desc">${t.desc}</div></div><div class="task-card-pending">${done?'<span style="font-size:14px;color:rgba(0,0,0,0.3);">✓</span>':`<div class="task-card-num">${t.pending}</div><div class="task-card-label">待处理</div>`}</div><span class="task-card-arrow">›</span>`;setTimeout(()=>card.classList.add('visible'),150*i);wrap.appendChild(card);});sc.appendChild(wrap);scrollB();st=setTimeout(r,1800);},delay);});}
function addRef(taskId,delay){return new Promise(r=>{st=setTimeout(()=>{const t=ch().tasks.find(x=>x.id===taskId)||{icon:'📧',title:taskId};const el=document.createElement('div');el.className='task-ref';el.innerHTML=`<span class="task-ref-icon">${t.icon}</span><span class="task-ref-label">${t.title}</span>`;sc.appendChild(el);scrollB();st=setTimeout(r,300);},delay);});}
function addEmail(email,delay){return new Promise(r=>{st=setTimeout(()=>{const el=document.createElement('div');el.className='email-inline glass';const tc=email.urgent?'urgent':'normal',tt=email.urgent?'紧急':'一般';el.innerHTML=`<div class="email-inline-header"><div class="email-inline-icon">📧</div><span class="email-inline-sender">${email.sender}</span><span class="email-inline-tag ${tc}">${tt}</span><span class="email-inline-time">${email.time}</span></div><div class="email-inline-subject">${email.subject}</div><div class="email-inline-summary">${email.summary}</div><div class="email-draft-box"><div class="email-draft-label">✦ AI 已准备草稿</div><div class="email-draft-text">${email.draft}</div></div><div class="email-inline-actions"><button class="btn btn-primary" onclick="openPanel()">编辑回复</button><button class="btn btn-outline">直接发送</button><button class="btn btn-ghost">稍后处理</button></div>`;sc.appendChild(el);scrollB();st=setTimeout(r,600);},delay);});}
function addCross(actions,delay){return new Promise(r=>{st=setTimeout(()=>{actions.forEach((a,i)=>{setTimeout(()=>{const el=document.createElement('div');el.className='cross-action';el.innerHTML=`<div class="cross-action-sys ${a.cls}">${a.icon}</div><span class="cross-action-text">${a.text}</span><div style="display:flex;gap:6px;flex-shrink:0;"><button class="btn btn-outline btn-sm">确认</button><button class="btn btn-ghost btn-sm">跳过</button></div>`;sc.appendChild(el);scrollB();},i*300);});st=setTimeout(r,actions.length*300+400);},delay);});}
function scrollB(){requestAnimationFrame(()=>ws.scrollTo({top:ws.scrollHeight,behavior:'smooth'}));}

/* ===== CASES (data-driven) ===== */
async function runCase(caseId){clearStream();addDateHeader();curCase=caseId;const c=ch();
    if(caseId==='morning'){
        await addBatch(c.batchInfo,200);
        await typeT('早上好 ☀️',1,300);
        await typeT(c.morningIntro,1,200);
        await typeT('',0,100);
        await addCards(c.tasks,200);
        await typeT('',0,100);
        await addRef('email',0);
        await typeT(c.urgentNote,1,200);
        await typeT('',0,100);
        await addEmail(c.emails[0],200);
        await addCross(c.crossActions,200);
        await typeT('',0,200);
        for(let i=1;i<c.emails.length;i++) await addEmail(c.emails[i],200);
        await typeT('',0,200);
        const otherTasks=c.tasks.filter(t=>t.id!=='email');
        for(let i=0;i<otherTasks.length;i++){await addRef(otherTasks[i].id,0);await typeT(c.otherTaskNotes[i],1,200);}
        await typeT('',0,200);
        await typeT('祝你今天工作顺利！有需要随时告诉我。',1,200);
    } else if(caseId==='nudge'){
        await typeT('检测到你已有 30 分钟没有任何操作了。',1,300);
        await typeT('想确认一下你的工作状况——是遇到了什么困难，还是临时有其他事情？',1,200);
        await typeT('',0,100);
        await typeT('以下任务需要抓紧完成：',1,200);
        await addCards(c.tasks.filter(t=>t.pending>0),200);
        await addRef('email',0);
        await typeT(`你有 ${c.tasks[0].pending} 封邮件尚未处理。${c.urgentNote}`,1,200);
        await typeT('',0,200);
        await typeT('如果需要帮助或临时调整任务分配，随时告诉我。',1,200);
        await typeT('请尽快恢复工作 🙏',1,200);
    } else if(caseId==='complete'){
        await typeT('太棒了 🎉',1,300);
        await typeT('你今天的所有任务已经全部完成！',1,200);
        await addCards(c.tasks.map(t=>({...t,pending:0})),200);
        await typeT('今日完成情况总结：',1,200);
        for(let i=0;i<c.tasks.length;i++){await addRef(c.tasks[i].id,0);await typeT(c.completeNotes[i],1,200);}
        await typeT('',0,200);
        await typeT('下一个邮件批次将在明天 08:30 拉取。如有紧急邮件，系统会实时通知你。',1,200);
        await typeT('辛苦了，今天表现很出色 👏',1,200);
    }
}

/* ===== INIT ===== */
renderDropdown();
runCase('morning');
</script>
